name: TWSE Webhook — Auto Register/Cancel Customers

on:
  repository_dispatch:
    types: [kofi_subscription, kofi_cancellation, kofi_refund, kofi_shop_order]

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  handle_webhook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: pip install -r requirements.txt 2>/dev/null || true

      - name: Process webhook event
        run: |
          echo '${{ toJSON(github.event.client_payload) }}' | \
          python scripts/premium.py webhook

      - name: Commit customer changes
        run: |
          git config user.name "Massor"
          git config user.email "slashman413@gmail.com"
          git add data/
          git diff --staged --quiet || git commit -m "auto: webhook customer update"
          git push
