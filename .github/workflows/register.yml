name: "Register Customer (Manual)"

on:
  workflow_dispatch:
    inputs:
      email:
        description: "Customer email address"
        required: true
        type: string
      tier:
        description: "Subscription tier"
        required: true
        default: "monthly"
        type: choice
        options:
          - monthly
          - quarterly
          - annual

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Register customer
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          CUST_EMAIL: ${{ inputs.email }}
          CUST_TIER: ${{ inputs.tier }}
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          python scripts/premium.py register --email "$CUST_EMAIL" --tier "$CUST_TIER"
      - name: Commit changes
        run: |
          git config user.name "Massor"
          git config user.email "slashman413@gmail.com"
          git add data/
          git diff --staged --quiet || git commit -m "auto: manual register ${{ inputs.email }}"
          git push
