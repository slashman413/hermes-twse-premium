name: TWSE Premium Scanner

on:
  schedule:
    # Scan at market open (01:00 UTC = 09:00 Taipei) and close (05:30 UTC = 13:30 Taipei)
    - cron: "0 1 * * 1-5"   # Weekdays 09:00 Taipei
    - cron: "30 5 * * 1-5"  # Weekdays 13:30 Taipei
  workflow_dispatch:

permissions:
  contents: write
  pages: write

env:
  PYTHON_VERSION: "3.11"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          repository: slashman413/twse-surge-stocks-dna
          path: twse-surge-stocks-dna
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: |
          pip install -r requirements.txt 2>/dev/null || true

      - name: Run scan and notify
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          python scripts/premium.py scan

      - name: Commit data to main
        run: |
          git config user.name "Massor"
          git config user.email "slashman413@gmail.com"
          git add docs/ data/
          git diff --staged --quiet || git commit -m "auto: daily signal scan"
          git push

  notify-failure:
    needs: [scan]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Discord failure alert
        run: >-
          curl -sf -H "Content-Type: application/json"
          -d '{"content": "\ud83d\udd34 ${{ github.repository }} \u2014 ${{ github.workflow }} \u6392\u7a0b\u5931\u6557 \u00b7 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
          "${{ secrets.DISCORD_WEBHOOK }}" || true
